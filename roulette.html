<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pixel iChancy – اللفة المجانية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background: #0d0f1a;
            color: #fff;
            text-align: center;
            font-family: sans-serif;
        }

        h2 {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .subtitle {
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .wheel {
            width: 260px;
            height: 260px;
            margin: 20px auto;
            border-radius: 50%;
            background-image: url("wheel.png");
            background-size: cover;
            transition: transform 4s cubic-bezier(0.15, 0.85, 0.25, 1);
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 25px solid red;
            margin: 0 auto;
        }

        button {
            padding: 12px 20px;
            background: #ff9800;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h2>🎡 Pixel iChancy</h2>
    <p class="subtitle">اللفة المجانية اليومية</p>

    <div class="pointer"></div>
    <div id="wheel" class="wheel"></div>

    <button id="spinBtn">تدوير الآن</button>

<script>
    const tg = Telegram.WebApp;
    tg.ready();

    let spinning = false;

    document.getElementById("spinBtn").onclick = () => {
        if (spinning) return;
        spinning = true;

        const wheel = document.getElementById("wheel");

        // HARD LUCK sector index = 5
        const hardLuckIndex = 5;
        const sectors = 8;
        const sectorAngle = 360 / sectors;

        const targetAngle = 360 - (hardLuckIndex * sectorAngle + sectorAngle / 2);
        const finalRotation = 360 * 5 + targetAngle;

        wheel.style.transform = `rotate(${finalRotation}deg)`;

        setTimeout(() => {
            tg.sendData(JSON.stringify({
                type: "spin_result",
                result: "hard_luck"
            }));
        }, 4200);
    };
</script>
</body>
</html>
