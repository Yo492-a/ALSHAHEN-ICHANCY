<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pixel iChancy – اللفة المجانية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background: #0a1a3a;
            background-image: radial-gradient(#1a2a5a, #0a1a3a);
            color: #fff;
            text-align: center;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        h2 {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .subtitle {
            opacity: 0.7;
            margin-bottom: 20px;
        }

        /* السهم */
        .pointer {
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 30px solid red;
            margin: 0 auto;
            margin-bottom: -10px;
            z-index: 10;
            position: relative;
        }

        /* حجم الروليت الحقيقي */
        .wheel-container {
            width: 260px;
            height: 260px;
            margin: 0 auto;
            position: relative;
        }

        .wheel {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.15, 0.85, 0.25, 1);
        }

        button {
            padding: 12px 20px;
            background: #ff9800;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            margin-top: 20px;
        }

        #timer {
            margin-top: 15px;
            font-size: 18px;
            opacity: 0.8;
        }

        .logo {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h2>🎡 Pixel iChancy</h2>
    <p class="subtitle">اللفة المجانية اليومية</p>

    <div class="pointer"></div>

    <div class="wheel-container">
        <img id="wheel" class="wheel" src="wheel.png">
    </div>

    <div id="timer"></div>

    <button id="spinBtn">تدوير الآن</button>

    <div class="logo">iChancy Pixel</div>

<script>
    const tg = Telegram.WebApp;
    tg.ready();

    let spinning = false;
    let canSpin = true;

    const hardLuckIndex = 5;
    const sectors = 8;
    const sectorAngle = 360 / sectors;

    document.getElementById("spinBtn").onclick = () => {
        if (!canSpin || spinning) return;
        spinning = true;

        const wheel = document.getElementById("wheel");

        const targetAngle = 360 - (hardLuckIndex * sectorAngle + sectorAngle / 2);
        const finalRotation = 360 * 5 + targetAngle;

        wheel.style.transform = `rotate(${finalRotation}deg)`;

        setTimeout(() => {
            tg.sendData(JSON.stringify({
                type: "spin_result",
                result: "hard_luck",
                message: "حظ أوفر حاول غداً"
            }));
        }, 4200);

        startTimer(24);
        canSpin = false;
    };

    function startTimer(hours) {
        let remaining = hours * 3600;
        const timer = document.getElementById("timer");

        const interval = setInterval(() => {
            const h = Math.floor(remaining / 3600);
            const m = Math.floor((remaining % 3600) / 60);

            timer.innerHTML = `⏳ متبقي: ${h} ساعة و ${m} دقيقة`;

            remaining--;

            if (remaining <= 0) {
                clearInterval(interval);
                timer.innerHTML = "🎉 يمكنك اللعب الآن!";
                canSpin = true;
                spinning = false;
            }
        }, 1000);
    }
</script>

</body>
</html>
